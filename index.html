<!DOCTYPE html>
<html>
<head>
    <title>Azure 3-Tier App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        input {
            width: 80%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            margin-bottom: 10px;
            outline: none;
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            color: white;
            font-weight: bold;
        }

        .add-btn {
            background-color: #28a745;
        }

        .load-btn {
            background-color: #007bff;
        }

        .delete-btn {
            background-color: red;
            padding: 5px 8px;
            font-size: 12px;
        }

        button:hover {
            opacity: 0.9;
        }

        ul {
            list-style: none;
            padding: 0;
            margin-top: 15px;
        }

        li {
            background: #f1f1f1;
            margin: 5px 0;
            padding: 10px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>👤 Azure User App</h2>

    <input type="text" id="name" placeholder="Enter name">
    <br>

    <button class="add-btn" onclick="addUser()">Add User</button>
    <button class="load-btn" onclick="getData()">Load Users</button>

    <ul id="list"></ul>
</div>

<script>
const BASE_URL = "https://backend-api-app-i-ccf0ezcccwetgfc0.centralindia-01.azurewebsites.net";

async function addUser() {
    const name = document.getElementById("name").value;

    if (!name) {
        alert("Please enter a name");
        return;
    }

    await fetch(`${BASE_URL}/addUser`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name })
    });

    alert("User Added!");
    document.getElementById("name").value = "";
    getData(); // auto refresh
}

async function getData() {
    const res = await fetch(`${BASE_URL}/data`);
    const data = await res.json();

    const list = document.getElementById("list");
    list.innerHTML = "";

    data.forEach(user => {
        const li = document.createElement("li");

        li.innerHTML = `
            ${user.name}
            <button class="delete-btn" onclick="deleteUser(${user.id})">
                Delete
            </button>
        `;

        list.appendChild(li);
    });
}

async function deleteUser(id) {
    if (!confirm("Are you sure you want to delete this user?")) return;

    await fetch(`${BASE_URL}/deleteUser/${id}`, {
        method: 'DELETE'
    });

    alert("User Deleted!");
    getData(); // refresh list
}
</script>

</body>
</html>
