<!DOCTYPE html>
<html>
<head>
    <title>Azure 3-Tier App</title>
</head>
<body>

<h2>My Azure User App</h2>

<input type="text" id="name" placeholder="Enter name">
<button onclick="addUser()">Add User</button>

<br><br>

<button onclick="getData()">Load Users</button>

<ul id="list"></ul>

<script>
async function addUser() {
    const name = document.getElementById("name").value;

    await fetch('https://backend-api-app-i-ccf0ezcccwetgfc0.centralindia-01.azurewebsites.net/addUser', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name })
    });

    alert("User Added!");
}

async function getData() {
    const res = await fetch('https://backend-api-app-i-ccf0ezcccwetgfc0.centralindia-01.azurewebsites.net/data');
    const data = await res.json();

    const list = document.getElementById("list");
    list.innerHTML = "";

    data.forEach(user => {
        const li = document.createElement("li");
        li.innerText = user.name;
        list.appendChild(li);
    });
}
</script>

</body>
</html>
