<!DOCTYPE html>
<html>
<head>
    <title>Azure 3-Tier App</title>
</head>
<body>

<h2>My Azure 3-Tier Application</h2>

<button onclick="getData()">Fetch Data</button>

<p id="output"></p>

<script>
async function getData() {
    try {
        const res = await fetch('https://backend-api-app-i-ccf0ezcccwetgfc0.centralindia-01.azurewebsites.net/data');      
	    const data = await res.json();

        document.getElementById("output").innerText = JSON.stringify(data);
    } catch (err) {
        document.getElementById("output").innerText = "Error: " + err;
    }
}
</script>

</body>
</html>
